<div class="demo-toolbar no-print">
  <button data-theme-toggle>Toggle dark/light</button>
  <button data-lang-toggle>Toggle עברית / English</button>
</div>

<section class="slide paper-dot-grid" aria-label="Title slide">
  <div class="slide__inner">
    <div class="hero">
      <span class="hero__kicker" data-animate="fade">
        <svg class="icon" style="width:16px;height:16px"><use href="#icon-target"/></svg>
        Strategy Workshop &middot; Transportation Directorate
      </span>

      <h1 class="hero__title" data-animate="paper-reveal">
        Road Accident Management System
      </h1>

      <p class="hero__subtitle sketch-host" data-sketch="underline" data-animate="slide-up" data-stagger style="--stagger-i:1;">
        Current State vs. Future AI-Powered Platform
      </p>

      <div class="hero__meta-row" data-animate="fade" data-stagger style="--stagger-i:2;">
        <span>Prepared for Executive Steering Committee</span>
        <span class="tabular">Q3 2026</span>
        <span class="ink-legend">
          <span class="ink-legend__item ink-blue"><span class="ink-legend__dot"></span>Ideas</span>
          <span class="ink-legend__item ink-red"><span class="ink-legend__dot"></span>Problems</span>
          <span class="ink-legend__item ink-green"><span class="ink-legend__dot"></span>Solutions</span>
          <span class="ink-legend__item ink-orange"><span class="ink-legend__dot"></span>Risks</span>
          <span class="ink-legend__item ink-purple"><span class="ink-legend__dot"></span>AI</span>
        </span>
      </div>
    </div>

    <div class="coffee-stain" style="bottom: 60px; inset-inline-end: 90px;"></div>

    <footer class="slide-footer no-print">
      <span class="slide-footer__brand">Workshop Design System</span>
      <span class="slide-footer__page">01 / 12</span>
    </footer>
  </div>
</section>
