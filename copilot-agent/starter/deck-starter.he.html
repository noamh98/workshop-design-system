<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TITLE_HERE — Workshop Deck</title>
<!--
  Workshop Design System — standalone deck starter (Hebrew RTL).
  All assets load from the public repo via jsDelivr CDN, so this file is a
  single self-contained HTML that works anywhere with internet access.
  Repo: https://github.com/noamh98/workshop-design-system
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/noamh98/workshop-design-system@main/project/styles.css">
<style>
  body { margin: 0; min-height: 100vh; background: #141519; display: grid; place-items: center; gap: 2rem; padding: 1.25rem; }
  .style-sketchbook:lang(he) .sketch-flow__label,
  .style-sketchbook:lang(he) .sketch-card__label { font-size: var(--text-base); }
  .style-sketchbook:lang(he) .sketch-list li { font-size: var(--text-lg); }
  @media print { body { padding: 0; background: #fff; } }
</style>
</head>
<body>

<!-- Hatch patterns for marker-fill KPI icons. MUST stay in a visible (not display:none) SVG root — Chromium won't resolve <pattern> from a hidden tree. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <pattern id="sketch-hatch-red" class="ink-red" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="currentColor" stroke-width="1.6"/></pattern>
  <pattern id="sketch-hatch-blue" class="ink-blue" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="currentColor" stroke-width="1.6"/></pattern>
  <pattern id="sketch-hatch-green" class="ink-green" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="currentColor" stroke-width="1.2"/></pattern>
</defs></svg>

<!-- Inline icon symbols (same-document <use> only; copy more from icons/sprite.svg as needed) -->
<svg style="display:none" aria-hidden="true"><defs>
  <symbol id="icon-doc" viewBox="0 0 24 24"><path d="M6.5 3.5h7l4 4V20a0.5 0.5 0 01-.5.5h-10.5a0.5 0.5 0 01-.5-.5V4a0.5 0.5 0 01.5-.5z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" fill="none"/><path d="M13.5 3.7V7.5h3.8M8.7 12h6.6M8.7 15h6.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
  <symbol id="icon-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.4" stroke="currentColor" stroke-width="1.75"/><path d="M5 19.5c0-3.6 3.1-6 7-6s7 2.4 7 6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></symbol>
  <symbol id="icon-bar-chart" viewBox="0 0 24 24"><path d="M4 20V10M9.5 20V4M15 20v-7M20 20v-4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></symbol>
  <symbol id="icon-chip" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.8" stroke="currentColor" stroke-width="1.6" fill="none"/><text x="12" y="12.6" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" fill="currentColor" stroke="none">AI</text><g stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M9 6V3M12 6V2.4M15 6V3M9 18v3M12 18v3.6M15 18v3M6 9H3M6 12H2.4M6 15H3M18 9h3M18 12h3.6M18 15h3"/></g></symbol>
  <symbol id="icon-warning-fill" viewBox="0 0 24 24"><path d="M12 4.2L21 19.5H3L12 4.2z" fill="currentColor" opacity="0.3" stroke="none"/><path d="M12 4.2L21 19.5H3L12 4.2z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round" fill="none"/><path d="M12 10v4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><circle cx="12" cy="16.6" r="0.9" fill="currentColor" stroke="none"/></symbol>
</defs></svg>

<!-- ============ SLIDE 1 (duplicate <section> per slide; print = one slide per page) ============ -->
<div lang="he" dir="rtl" style="width:100%; max-width:1680px">
  <section class="slide style-sketchbook" lang="he" dir="rtl" aria-label="TITLE_HERE">
    <div class="sketch-dash">

      <div class="sketch-dash__title-block">
        <h1 class="sketch-dash__title">TITLE_HERE</h1>
        <p class="sketch-dash__subtitle"><span class="sketch-host" data-sketch="underline">SUBTITLE_HERE</span></p>
      </div>

      <!-- CONTENT_HERE: replace with sketch-cards, flows, KPIs, charts.
           Building blocks (see knowledge / repo docs):
           card:    <div class="sketch-card" data-ink="blue" data-sketch="box"> <span class="sketch-card__label">…</span> … </div>
           list:    <ul class="sketch-list sketch-list--checks"><li>…</li></ul>  (or --bullets)
           chart:   <div data-chart="donut|bar|bar-h|stacked-bar|line|scatter|gantt|waterfall" data-chart-config='{"segments":[{"value":23,"color":"var(--ink-red)"}]}' style="width:84px;height:84px"></div>
           flow:    <div class="sketch-flow"> steps with .sketch-flow__circle[data-sketch=circle] + .flow-arrow[data-sketch=arrow-h] </div>
           KPI:     <div class="sketch-card sketch-kpi" data-ink="red" data-sketch="box"> .sketch-kpi__icon + .sketch-kpi__body (head/value/delta/foot) </div>
           numbers: always <bdi class="tabular">1,247</bdi>; Latin terms in <bdi>AI</bdi>
      -->

    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/gh/noamh98/workshop-design-system@main/project/js/sketch.js"></script>
<script src="https://cdn.jsdelivr.net/gh/noamh98/workshop-design-system@main/project/js/charts.js"></script>
<script src="https://cdn.jsdelivr.net/gh/noamh98/workshop-design-system@main/project/js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/gh/noamh98/workshop-design-system@main/project/js/reveal.js"></script>
<script>
  (function init(tries) {
    if (window.Sketch && window.Charts) {
      window.Charts.init();
      window.Sketch.refresh();
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function () { window.Sketch.scheduleRefresh(); });
      }
    } else if (tries < 60) {
      setTimeout(function () { init(tries + 1); }, 150);
    }
  })(0);
</script>
</body>
</html>
