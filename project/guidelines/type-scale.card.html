<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { background: var(--color-paper); padding: 16px 24px; color: var(--color-ink); font-family: var(--font-body-hebrew), sans-serif; }
.r { display: grid; grid-template-columns: 90px 1fr; gap: 12px; align-items: baseline; }
.k { font-family: var(--font-mono); font-size: 10px; color: var(--color-ink-3); direction: ltr; text-align: left; }
</style></head>
<body>
<div class="r"><span class="k">--text-3xl</span><span style="font-size:var(--text-3xl);line-height:1.1">כותרת שקף</span></div>
<div class="r"><span class="k">--text-xl</span><span style="font-size:var(--text-xl)">כותרת משנית</span></div>
<div class="r"><span class="k">--text-lg</span><span style="font-size:var(--text-lg)">תת־כותרת</span></div>
<div class="r"><span class="k">--text-sm</span><span style="font-size:var(--text-sm)">טקסט רץ סטנדרטי</span></div>
<div class="r"><span class="k">--text-xs</span><span style="font-size:var(--text-xs);color:var(--color-ink-3)">תווית / הערת שוליים</span></div>
</body></html>
