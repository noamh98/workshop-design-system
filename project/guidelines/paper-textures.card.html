<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { background: var(--color-paper); padding: 14px; }
.row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.t { height: 120px; border-radius: 8px; border: 1px solid var(--color-hairline); position: relative; }
.t span { position: absolute; inset-inline-start: 8px; inset-block-end: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--color-ink-3); direction: ltr; }
</style></head>
<body>
<div class="row">
  <div class="t paper-dot-grid"><span>dot-grid</span></div>
  <div class="t paper-notebook"><span>notebook</span></div>
  <div class="t paper-blueprint"><span>blueprint</span></div>
  <div class="t paper-kraft"><span>kraft</span></div>
</div>
</body></html>
