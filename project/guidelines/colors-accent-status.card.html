<!-- @dsCard group="Colors" viewport="700x160" name="Accent, Status & Charts" subtitle="מבטא כחול עמוק, סטטוסים, פלטת דאטה" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { background: var(--color-paper); padding: 16px; font-family: var(--font-mono); display: grid; gap: 12px; }
.row { display: flex; gap: 8px; align-items: center; }
.s { height: 40px; flex: 1; border-radius: 8px; border: 1px solid var(--color-hairline); }
.t { font-size: 11px; color: var(--color-ink-3); width: 64px; flex: 0 0 auto; direction: ltr; }
</style></head>
<body>
<div class="row"><span class="t">accent</span>
  <div class="s" style="background:var(--color-accent)"></div>
  <div class="s" style="background:var(--color-accent-strong)"></div>
  <div class="s" style="background:var(--color-accent-soft)"></div>
  <div class="s" style="background:var(--color-accent-2)"></div>
  <div class="s" style="background:var(--color-accent-2-soft)"></div>
</div>
<div class="row"><span class="t">status</span>
  <div class="s" style="background:var(--color-success)"></div>
  <div class="s" style="background:var(--color-warning)"></div>
  <div class="s" style="background:var(--color-danger)"></div>
  <div class="s" style="background:var(--color-success-soft)"></div>
  <div class="s" style="background:var(--color-danger-soft)"></div>
</div>
<div class="row"><span class="t">charts</span>
  <div class="s" style="background:var(--chart-1)"></div>
  <div class="s" style="background:var(--chart-2)"></div>
  <div class="s" style="background:var(--chart-3)"></div>
  <div class="s" style="background:var(--chart-4)"></div>
  <div class="s" style="background:var(--chart-5)"></div>
</div>
</body></html>
