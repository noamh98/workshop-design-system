<!-- @dsCard group="Colors" viewport="700x150" name="Paper & Neutrals" subtitle="נייר חם, דיו — לא לבן/שחור טהורים" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { background: var(--color-paper); padding: 16px; font-family: var(--font-mono); }
.row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
.s { height: 64px; border-radius: 8px; border: 1px solid var(--color-hairline); }
.l { font-size: 10px; color: var(--color-ink-3); margin-top: 4px; direction: ltr; text-align: left; }
</style></head>
<body>
<div class="row">
  <div><div class="s" style="background:var(--color-paper)"></div><div class="l">--color-paper</div></div>
  <div><div class="s" style="background:var(--color-paper-raised)"></div><div class="l">-paper-raised</div></div>
  <div><div class="s" style="background:var(--color-paper-sunken)"></div><div class="l">-paper-sunken</div></div>
  <div><div class="s" style="background:var(--color-hairline)"></div><div class="l">--color-hairline</div></div>
  <div><div class="s" style="background:var(--color-ink-muted)"></div><div class="l">--color-ink-muted</div></div>
  <div><div class="s" style="background:var(--color-ink-3)"></div><div class="l">--color-ink-3</div></div>
  <div><div class="s" style="background:var(--color-ink-2)"></div><div class="l">--color-ink-2</div></div>
  <div><div class="s" style="background:var(--color-ink)"></div><div class="l">--color-ink</div></div>
</div>
</body></html>
